<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>C.Factory v4</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3f0;--card:#fff;--border:#e0ddd8;
  --accent:#1a3a5c;--accent2:#c8401a;
  --green:#2d7a3a;--gbg:#eaf5ec;
  --red:#c0392b;--rbg:#fdf0ed;
  --purple:#7d3c98;--pbg:#f5eef8;
  --muted:#777;--text:#1a1a1a;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem;background:linear-gradient(150deg,#1a3a5c,#0d2340 60%,#c8401a)}
.logo h1{font-size:2rem;font-weight:800;color:#fff;letter-spacing:3px;text-align:center}
.logo p{color:rgba(255,255,255,0.5);font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-top:4px;margin-bottom:2rem}
.lcard{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.lcard h2{font-size:1rem;color:var(--accent);text-align:center;margin-bottom:1.5rem}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:0.7rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.fg input,.fg select{width:100%;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;color:var(--text);background:#fff;outline:none;transition:border .2s}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.lbtn{width:100%;padding:.75rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:700;margin-top:.25rem}
.lbtn:hover{background:#245080}
.lerr{color:var(--red);font-size:.8rem;text-align:center;margin-top:.5rem;display:none}

/* LAYOUT */
#app{display:none;height:100vh;flex-direction:column}
#hdr{background:var(--accent);color:#fff;padding:.7rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hbrand{font-size:1.1rem;font-weight:800;letter-spacing:1px}
.hbrand span{color:#e8a070;font-size:.65rem;vertical-align:super}
.hright{display:flex;align-items:center;gap:8px;font-size:.8rem}
.ubadge{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;font-size:.72rem}
.dot{width:7px;height:7px;border-radius:50%;background:#2ecc71;animation:pulse 2s infinite;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lout-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.72rem}

/* BODY LAYOUT */
#body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:210px;background:#fff;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.sb-section{padding:.75rem .75rem .25rem;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.sb-item{display:flex;align-items:center;gap:8px;padding:.55rem .85rem;cursor:pointer;font-size:.82rem;color:var(--text);border-left:3px solid transparent;transition:all .15s}
.sb-item:hover{background:var(--bg)}
.sb-item.active{background:#edf4fc;color:var(--accent);border-left-color:var(--accent);font-weight:600}
.sb-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:.65rem;padding:1px 6px;border-radius:10px;font-weight:700}
.sb-item .badge.g{background:var(--green)}

/* MAIN */
#main{flex:1;overflow-y:auto;padding:1.25rem}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:1.25rem}
.scard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;text-align:center}
.snum{font-size:1.5rem;font-weight:800;color:var(--accent)}
.snum.g{color:var(--green)}.snum.r{color:var(--red)}.snum.o{color:#d68910}.snum.p{color:var(--purple)}
.slbl{font-size:.68rem;color:var(--muted);margin-top:2px}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.ph h2{font-size:1.1rem;color:var(--accent)}
.ph-sub{font-size:.75rem;color:var(--muted)}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.fbtn{padding:4px 12px;border-radius:20px;font-size:.73rem;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted)}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* TASK CARD */
.tcard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;margin-bottom:.5rem;border-left:3px solid #ddd}
.tcard.acil{border-left-color:var(--red)}
.tcard.normal{border-left-color:#3498db}
.tcard.done{border-left-color:var(--green);opacity:.65}
.tcard.sevk{border-left-color:var(--purple)}
.ttop{display:flex;gap:10px;align-items:flex-start}
.chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all .15s}
.chk.done{background:var(--green);border-color:var(--green);color:#fff}
.chk.sevk{background:var(--purple);border-color:var(--purple);color:#fff}
.tbody{flex:1}
.ttext{font-size:.87rem;line-height:1.55}
.ttext.done{text-decoration:line-through;color:var(--muted)}
.tmeta{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;align-items:center}
.tag{font-size:.66rem;padding:2px 8px;border-radius:10px;font-weight:600}
.t-dept{background:#edf4fc;color:#185FA5}
.t-acil{background:var(--rbg);color:var(--red)}
.t-normal{background:#edf4fc;color:#2980b9}
.t-done{background:var(--gbg);color:var(--green)}
.t-sevk{background:var(--pbg);color:var(--purple)}
.t-person{background:#f5f5f5;color:#555}
.tactions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.abtn{font-size:.7rem;padding:3px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted)}
.abtn.g{border-color:var(--green);color:var(--green);background:var(--gbg)}
.abtn.p{border-color:var(--purple);color:var(--purple)}
.abtn.r{border-color:var(--red);color:var(--red)}
.tfoot{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-size:.7rem;color:var(--muted)}
.termin{padding:2px 8px;border-radius:8px;font-size:.66rem;font-weight:600}
.t-late{background:var(--rbg);color:var(--red)}
.t-soon{background:#fef9ec;color:#d68910}
.t-ok{background:var(--gbg);color:var(--green)}

/* FORM */
.fcard{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.fcard h3{font-size:.95rem;color:var(--accent);margin-bottom:1rem}
.irow{display:flex;gap:.75rem;flex-wrap:wrap}
.irow .fg{flex:1;min-width:140px}
textarea{width:100%;padding:.7rem;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;resize:vertical;min-height:80px;color:var(--text);font-family:inherit;outline:none}
textarea:focus{border-color:var(--accent)}
.add-row-btn{background:#f0f7ff;border:1px dashed #3498db;color:#2980b9;width:100%;padding:.55rem;border-radius:8px;cursor:pointer;font-size:.82rem;margin-top:.5rem}
.trow{display:flex;gap:6px;align-items:center;margin-bottom:7px;flex-wrap:wrap}
.trow input,.trow select{padding:.48rem .65rem;border:1.5px solid var(--border);border-radius:7px;font-size:.8rem;color:var(--text);background:#fff;font-family:inherit}
.trow input:focus,.trow select:focus{border-color:var(--accent);outline:none}
.trow input.big{flex:1;min-width:160px}
.rm-btn{background:var(--rbg);border:none;color:var(--red);padding:5px 9px;border-radius:6px;cursor:pointer}
.submit-btn{width:100%;padding:.75rem;background:var(--accent2);color:#fff;border:none;border-radius:9px;font-size:.95rem;cursor:pointer;font-weight:700;margin-top:.75rem}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

/* CALENDAR */
.cal-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:var(--accent);color:#fff}
.cal-hdr h3{font-size:.9rem}
.cal-nav{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.8rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-day-hdr{background:#f8f7f4;padding:6px;text-align:center;font-size:.68rem;color:var(--muted);font-weight:600}
.cal-day{background:#fff;padding:4px;min-height:70px;position:relative}
.cal-day.other{background:#fafafa}
.cal-day.today .dn{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
.dn{font-size:.75rem;color:var(--text);margin-bottom:2px}
.cal-dot{font-size:.65rem;padding:1px 5px;border-radius:4px;margin-bottom:1px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-dot.acil{background:var(--rbg);color:var(--red)}
.cal-dot.normal{background:#edf4fc;color:#185FA5}
.cal-dot.done{background:var(--gbg);color:var(--green)}

/* DEPT PAGE */
.dept-bar-wrap{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.5rem}
.dept-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dept-bar-name{font-size:.88rem;font-weight:600;color:var(--accent)}
.dept-bar-stat{font-size:.75rem;color:var(--muted)}
.dbar{height:8px;background:#eee;border-radius:4px;overflow:hidden}
.dbar-fill{height:100%;border-radius:4px;background:var(--green);transition:width .4s}

/* HISTORY */
.mitem{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:.5rem;cursor:pointer}
.mitem:hover{border-color:#3498db}
.mtop{display:flex;justify-content:space-between;align-items:center}
.mdate{font-size:.75rem;color:var(--muted)}
.mprev{font-size:.8rem;color:var(--muted);margin-top:4px}

/* MODAL */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:90%;max-width:440px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:1rem;color:var(--accent);margin-bottom:1rem}
.mpreview{background:var(--bg);border-radius:8px;padding:.75rem;font-size:.8rem;margin-bottom:1rem;color:var(--muted);border-left:3px solid var(--accent);line-height:1.5}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.mbtn-cancel{padding:.5rem 1rem;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-size:.85rem}
.mbtn-ok{padding:.5rem 1rem;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:700}

/* NOTIF */
.notif{position:fixed;bottom:1.5rem;right:1.5rem;color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-size:.85rem;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:slin .3s ease}
.notif.ok{background:var(--green)}
.notif.err{background:var(--red)}
.notif.info{background:var(--accent)}
@keyframes slin{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:.9rem}
.perm-warn{background:#fef9ec;border:1px solid #f0c050;border-radius:8px;padding:.85rem 1rem;font-size:.85rem;color:#7a5c00;margin-bottom:1rem}
.section-sep{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:.75rem 0 .5rem;padding-bottom:4px;border-bottom:1px solid var(--border)}

/* toggle */
.toggle-row{display:flex;gap:6px;margin-bottom:1rem}
.toggle-btn{padding:5px 14px;border-radius:20px;font-size:.75rem;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted)}
.toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="logo">
    <h1>C.FACTORY</h1>
    <p>Toplantı & Görev Takip · v4.0</p>
  </div>
  <div class="lcard">
    <h2>Sisteme Giriş</h2>
    <div class="fg"><label>Adınız Soyadınız</label><input id="l-name" type="text" placeholder="Ad Soyad..."/></div>
    <div class="fg"><label>Bölümünüz</label>
      <select id="l-dept">
        <option value="">— Bölüm seçin —</option>
        <option>Ar-Ge</option><option>Kesici Pres</option><option>Enjeksiyon</option>
        <option>Bobinaj</option><option>Talaşlı 1</option><option>Talaşlı 2</option>
        <option>Montaj</option><option>Üretim</option><option>Planlama</option>
        <option>Nordex</option><option>Satış</option><option>Orta Gerilim</option>
        <option>Bakım</option><option>Kalite</option><option>Lojistik</option><option>Yönetim</option>
      </select>
    </div>
    <div class="fg"><label>Rolünüz</label>
      <select id="l-role">
        <option value="izleyici">İzleyici</option>
        <option value="editor">Editör</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="fg"><label>Şifre</label><input id="l-pass" type="password" placeholder="Şifre..." onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="lbtn" onclick="doLogin()">Giriş Yap →</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;height:100vh;flex-direction:column">
  <div id="hdr">
    <div class="hbrand">C.FACTORY <span>v4</span></div>
    <div class="hright">
      <span class="dot"></span>
      <span class="ubadge" id="h-user">—</span>
      <button class="lout-btn" onclick="doLogout()">Çıkış</button>
    </div>
  </div>
  <div id="body">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sb-section">Ana Menü</div>
      <div class="sb-item active" data-page="dashboard" onclick="goPage(this)">📋 Bugünün Görevleri</div>
      <div class="sb-item" data-page="new-meeting" onclick="goPage(this)">➕ Toplantı Ekle</div>
      <div class="sb-item" data-page="history" onclick="goPage(this)">📅 Geçmiş</div>
      <div class="sb-item" data-page="all-depts" onclick="goPage(this)">🏭 Tüm Bölümler</div>
      <div class="sb-section">Bölümler</div>
      <div id="dept-links"></div>
    </div>
    <!-- MAIN -->
    <div id="main">
      <div id="page-dashboard"></div>
      <div id="page-new-meeting" style="display:none"></div>
      <div id="page-history" style="display:none"></div>
      <div id="page-all-depts" style="display:none"></div>
      <div id="page-dept" style="display:none"></div>
    </div>
  </div>
</div>

<!-- SEVK MODAL -->
<div id="sevk-overlay" class="overlay" style="display:none">
  <div class="modal">
    <h3>Bölüme Sevk Et</h3>
    <div class="mpreview" id="sevk-preview"></div>
    <div class="fg"><label>Sevk edilecek bölüm</label>
      <select id="sm-dept">
        <option>Ar-Ge</option><option>Kesici Pres</option><option>Enjeksiyon</option>
        <option>Bobinaj</option><option>Talaşlı 1</option><option>Talaşlı 2</option>
        <option>Montaj</option><option>Üretim</option><option>Planlama</option>
        <option>Nordex</option><option>Satış</option><option>Orta Gerilim</option>
        <option>Bakım</option><option>Kalite</option><option>Lojistik</option><option>Yönetim</option>
      </select>
    </div>
    <div class="fg"><label>Sorumlu kişi</label><input type="text" id="sm-person" placeholder="İsim..."/></div>
    <div class="fg"><label>Termin tarihi</label><input type="date" id="sm-date"/></div>
    <div class="fg"><label>Not</label><input type="text" id="sm-note" placeholder="Sevk notu..."/></div>
    <div class="mbtns">
      <button class="mbtn-cancel" onclick="closeSevk()">İptal</button>
      <button class="mbtn-ok" onclick="confirmSevk()">Sevk Et ✓</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════
// CONFIG
// ════════════════════════════════
const SUPABASE_URL  = 'https://uyvbutaozsybpjvmahqf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dmJ1dGFvenN5YnBqdm1haHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MzQyNzAsImV4cCI6MjA5NjUxMDI3MH0.xPsAQo-PwOe1oGBrp8rxBGdeG0u71fjmvE2i7UdjCuU';

// Şifreler — istersen değiştir
const PASSWORDS = {
  izleyici: 'cfactory2024',
  editor:   'editor2024',
  admin:    'admin2024'
};

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const DEPTS = ['Ar-Ge','Kesici Pres','Enjeksiyon','Bobinaj','Talaşlı 1','Talaşlı 2',
  'Montaj','Üretim','Planlama','Nordex','Satış','Orta Gerilim','Bakım','Kalite','Lojistik','Yönetim'];

// ════════════════════════════════
// STATE
// ════════════════════════════════
let user = null;
let meetings = [];
let activePage = 'dashboard';
let activeDept = null;
let activeFilter = 'hepsi';
let calYear, calMonth;
let sevkMid = null, sevkTid = null;

// ════════════════════════════════
// LOGIN
// ════════════════════════════════
function doLogin(){
  const name = document.getElementById('l-name').value.trim();
  const dept = document.getElementById('l-dept').value;
  const role = document.getElementById('l-role').value;
  const pass = document.getElementById('l-pass').value;
  const lerr = document.getElementById('lerr');
  if(!name || !dept){ lerr.textContent='İsim ve bölüm zorunlu.'; lerr.style.display='block'; return; }
  if(pass !== PASSWORDS[role]){ lerr.textContent='Şifre yanlış.'; lerr.style.display='block'; return; }
  lerr.style.display='none';
  user = { name, dept, role };
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('h-user').textContent = name + ' · ' + dept;
  buildSidebar();
  loadData();
  subscribeRt();
}
function doLogout(){
  user = null; meetings = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('l-pass').value = '';
}

// ════════════════════════════════
// SUPABASE
// ════════════════════════════════
async function loadData(){
  const { data, error } = await sb.from('meetings').select('*, tasks(*)').order('date',{ascending:false});
  if(error){ notif('Veri yüklenemedi','err'); return; }
  meetings = data || [];
  renderPage(activePage);
}

function subscribeRt(){
  sb.channel('cf-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>loadData())
    .on('postgres_changes',{event:'*',schema:'public',table:'meetings'},()=>loadData())
    .subscribe();
}

// ════════════════════════════════
// NAVIGATION
// ════════════════════════════════
function buildSidebar(){
  const el = document.getElementById('dept-links');
  el.innerHTML = DEPTS.map(d =>
    `<div class="sb-item" data-page="dept" data-dept="${d}" onclick="goDept('${d}',this)">${d}</div>`
  ).join('');
}

function goPage(el){
  activeDept = null;
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  activePage = el.dataset.page;
  renderPage(activePage);
}

function goDept(dept, el){
  activeDept = dept;
  activePage = 'dept';
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  renderPage('dept');
}

function renderPage(page){
  ['dashboard','new-meeting','history','all-depts','dept'].forEach(p=>{
    document.getElementById('page-'+p).style.display = p===page?'block':'none';
  });
  if(page==='dashboard')   renderDashboard();
  if(page==='new-meeting') renderNewMeeting();
  if(page==='history')     renderHistory();
  if(page==='all-depts')   renderAllDepts();
  if(page==='dept')        renderDeptPage();
}

// ════════════════════════════════
// DASHBOARD
// ════════════════════════════════
function getTodayMeeting(){ return meetings.find(m=>m.date===today()) || meetings[0] || null; }

function renderDashboard(){
  const m = getTodayMeeting();
  const el = document.getElementById('page-dashboard');
  const tasks = m ? (m.tasks||[]) : [];
  const total=tasks.length, done=tasks.filter(t=>t.status==='tamamlandi').length,
    acil=tasks.filter(t=>t.priority==='acil'&&t.status!=='tamamlandi').length,
    sevk=tasks.filter(t=>t.sevk_dept).length;

  let html = `<div class="ph">
    <div><h2>${m ? (m.title||'Bugünün Toplantısı') : 'Bugün'}</h2>
    <div class="ph-sub">${new Date().toLocaleDateString('tr-TR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div>
  </div>`;

  if(!m){ html += '<div class="empty">📋 Bugün için toplantı notu girilmemiş.<br><small>Toplantı Ekle sayfasından ekleyebilirsiniz.</small></div>';
    el.innerHTML=html; return; }

  html += `<div class="stats">
    <div class="scard"><div class="snum">${total}</div><div class="slbl">Toplam</div></div>
    <div class="scard"><div class="snum g">${done}</div><div class="slbl">Tamamlandı</div></div>
    <div class="scard"><div class="snum r">${acil}</div><div class="slbl">Acil</div></div>
    <div class="scard"><div class="snum o">${total-done}</div><div class="slbl">Bekliyor</div></div>
    <div class="scard"><div class="snum p">${sevk}</div><div class="slbl">Sevk</div></div>
  </div>
  <div class="filters">
    <button class="fbtn ${activeFilter==='hepsi'?'active':''}" onclick="setFilter('hepsi',this)">Hepsi</button>
    <button class="fbtn ${activeFilter==='acil'?'active':''}" onclick="setFilter('acil',this)">🔴 Acil</button>
    <button class="fbtn ${activeFilter==='bekliyor'?'active':''}" onclick="setFilter('bekliyor',this)">🔵 Bekliyor</button>
    <button class="fbtn ${activeFilter==='tamamlandi'?'active':''}" onclick="setFilter('tamamlandi',this)">✅ Tamamlandı</button>
    <button class="fbtn ${activeFilter==='sevk'?'active':''}" onclick="setFilter('sevk',this)">🔗 Sevk</button>
  </div>`;

  let filtered = tasks;
  if(activeFilter==='acil') filtered=tasks.filter(t=>t.priority==='acil'&&t.status!=='tamamlandi');
  else if(activeFilter==='bekliyor') filtered=tasks.filter(t=>t.status==='bekliyor');
  else if(activeFilter==='tamamlandi') filtered=tasks.filter(t=>t.status==='tamamlandi');
  else if(activeFilter==='sevk') filtered=tasks.filter(t=>t.sevk_dept);

  if(!filtered.length) html += '<div class="empty">Bu filtrede görev yok.</div>';
  else html += filtered.map(t=>taskCard(t,m.id)).join('');

  el.innerHTML = html;
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filters .fbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderDashboard();
}

// ════════════════════════════════
// TASK CARD
// ════════════════════════════════
function taskCard(t, mid){
  const isDone = t.status==='tamamlandi';
  const isSevk = !!t.sevk_dept;
  const cls = isDone?'done':isSevk?'sevk':t.priority==='acil'?'acil':'normal';
  const canEdit = user && (user.role==='editor'||user.role==='admin');
  const ts = t.termin ? termSt(t.termin) : null;
  return `<div class="tcard ${cls}">
    <div class="ttop">
      <div class="chk ${isDone?'done':isSevk?'sevk':''}"
        onclick="${canEdit?`toggleDone('${mid}','${t.id}')`:``}" style="${!canEdit?'cursor:default':''}">
        ${isDone?'✓':isSevk?'→':''}
      </div>
      <div class="tbody">
        <div class="ttext ${isDone?'done':''}">${esc(t.text)}</div>
        <div class="tmeta">
          ${t.dept?`<span class="tag t-dept">${t.dept}</span>`:''}
          <span class="tag t-${t.priority}">${t.priority==='acil'?'🔴 Acil':'🔵 Normal'}</span>
          ${isDone?'<span class="tag t-done">✅ Tamamlandı</span>':''}
          ${isSevk?`<span class="tag t-sevk">→ ${t.sevk_dept}</span>`:''}
          ${t.sorumlu?`<span class="tag t-person">👤 ${t.sorumlu}</span>`:''}
        </div>
        ${canEdit&&!isDone?`<div class="tactions">
          <button class="abtn g" onclick="toggleDone('${mid}','${t.id}')">✓ Tamamlandı</button>
          <button class="abtn p" onclick="openSevk('${mid}','${t.id}')">→ Sevke Gönder</button>
          ${t.priority==='acil'
            ?`<button class="abtn" onclick="setPrio('${t.id}','normal')">Normal yap</button>`
            :`<button class="abtn r" onclick="setPrio('${t.id}','acil')">🔴 Acil işaretle</button>`}
        </div>`:''}
        ${t.updated_by?`<div style="font-size:.67rem;color:var(--muted);margin-top:4px">Son: ${t.updated_by}</div>`:''}
      </div>
    </div>
    <div class="tfoot">
      <span>${t.sevk_note?'📝 '+esc(t.sevk_note):''}</span>
      ${ts?`<span class="termin t-${ts}">${fmt(t.termin)} — ${termLbl(ts)}</span>`:
           t.termin?`<span class="termin t-ok">${fmt(t.termin)}</span>`:''}
    </div>
  </div>`;
}

// ════════════════════════════════
// TASK ACTIONS
// ════════════════════════════════
async function toggleDone(mid,tid){
  const m=meetings.find(x=>x.id===mid); const t=(m.tasks||[]).find(x=>x.id===tid);
  const ns=t.status==='tamamlandi'?'bekliyor':'tamamlandi';
  const by=user.name+' ('+new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})+')';
  const{error}=await sb.from('tasks').update({status:ns,updated_by:by}).eq('id',tid);
  if(error) notif('Hata: '+error.message,'err');
  else notif(ns==='tamamlandi'?'✅ Tamamlandı!':'↩ Geri alındı','ok');
}

async function setPrio(tid,prio){
  const{error}=await sb.from('tasks').update({priority:prio,updated_by:user.name}).eq('id',tid);
  if(error) notif('Hata','err');
  else notif(prio==='acil'?'🔴 Acil işaretlendi':'Normale alındı','info');
}

function openSevk(mid,tid){
  sevkMid=mid; sevkTid=tid;
  const m=meetings.find(x=>x.id===mid); const t=(m.tasks||[]).find(x=>x.id===tid);
  document.getElementById('sevk-preview').textContent=t.text.substring(0,120);
  document.getElementById('sm-dept').value=t.dept||DEPTS[0];
  document.getElementById('sm-person').value=t.sorumlu||'';
  document.getElementById('sm-date').value=t.termin||today();
  document.getElementById('sm-note').value=t.sevk_note||'';
  document.getElementById('sevk-overlay').style.display='flex';
}
function closeSevk(){ document.getElementById('sevk-overlay').style.display='none'; }
async function confirmSevk(){
  const p={sevk_dept:document.getElementById('sm-dept').value,
    sorumlu:document.getElementById('sm-person').value,
    termin:document.getElementById('sm-date').value||null,
    sevk_note:document.getElementById('sm-note').value,
    updated_by:user.name};
  const{error}=await sb.from('tasks').update(p).eq('id',sevkTid);
  if(error) notif('Hata','err');
  else notif('✈️ '+p.sevk_dept+' bölümüne sevk edildi!','ok');
  closeSevk();
}

// ════════════════════════════════
// NEW MEETING
// ════════════════════════════════
function renderNewMeeting(){
  const el = document.getElementById('page-new-meeting');
  if(user.role!=='admin'){
    el.innerHTML='<div class="perm-warn">⚠️ Toplantı eklemek için <strong>Admin</strong> rolüyle giriş yapın.</div>';
    return;
  }
  el.innerHTML=`<div class="fcard">
    <h3>Yeni Toplantı Notları</h3>
    <div class="irow">
      <div class="fg"><label>Tarih</label><input type="date" id="m-date" value="${today()}"/></div>
      <div class="fg"><label>Başlık</label><input type="text" id="m-title" placeholder="Günlük Üretim Toplantısı"/></div>
    </div>
    <div class="fg" style="margin-top:.75rem"><label>Genel Notlar</label><textarea id="m-notes" placeholder="Toplantıda görüşülen genel notlar..."></textarea></div>
    <div style="margin-top:1rem">
      <div class="section-sep">Görevler / Aksiyon Maddeleri</div>
      <div id="task-rows"></div>
      <button class="add-row-btn" onclick="addRow()">+ Yeni görev ekle</button>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitMeeting()">Toplantıyı Kaydet & Yayınla</button>
  </div>`;
}

function addRow(){
  const id='r'+Date.now();
  const div=document.createElement('div');
  div.className='trow'; div.id=id;
  div.innerHTML=`
    <input class="big" type="text" placeholder="Görev açıklaması..."/>
    <select>${DEPTS.map(d=>`<option>${d}</option>`).join('')}</select>
    <select><option value="normal">Normal</option><option value="acil">🔴 Acil</option></select>
    <input type="date" title="Termin"/>
    <button class="rm-btn" onclick="document.getElementById('${id}').remove()">✕</button>`;
  document.getElementById('task-rows').appendChild(div);
}

async function submitMeeting(){
  const date=document.getElementById('m-date').value;
  if(!date){notif('Tarih seçin','err');return;}
  const title=document.getElementById('m-title').value||'Günlük Üretim Toplantısı';
  const notes=document.getElementById('m-notes').value;
  const btn=document.getElementById('submit-btn'); btn.disabled=true;

  const{data:mData,error:mErr}=await sb.from('meetings')
    .upsert({date,title,notes,created_by:user.name},{onConflict:'date'})
    .select().single();
  if(mErr){notif('Hata: '+mErr.message,'err');btn.disabled=false;return;}

  const rows=document.querySelectorAll('#task-rows .trow');
  const tasks=[];
  rows.forEach((r,i)=>{
    const inp=r.querySelectorAll('input[type=text],select,input[type=date]');
    const text=inp[0]?.value?.trim(); if(!text)return;
    tasks.push({meeting_id:mData.id,text,dept:inp[1]?.value,priority:inp[2]?.value,
      status:'bekliyor',termin:inp[3]?.value||null,created_by:user.name});
  });
  if(tasks.length){
    const{error:tErr}=await sb.from('tasks').insert(tasks);
    if(tErr){notif('Görev hatası: '+tErr.message,'err');btn.disabled=false;return;}
  }
  btn.disabled=false;
  notif('✅ Toplantı kaydedildi!','ok');
  // Dash'e geç
  document.querySelector('.sb-item[data-page="dashboard"]').click();
}

// ════════════════════════════════
// HISTORY
// ════════════════════════════════
function renderHistory(){
  const el=document.getElementById('page-history');
  if(!meetings.length){el.innerHTML='<div class="empty">Henüz toplantı yok.</div>';return;}
  el.innerHTML=`<div class="ph"><h2>Geçmiş Toplantılar</h2></div>`+
    meetings.map(m=>`
      <div class="mitem" onclick="viewMeeting('${m.id}')">
        <div class="mtop">
          <strong style="font-size:.88rem">${m.title||'Toplantı'}</strong>
          <span class="mdate">${fmt(m.date)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <span class="mprev">${(m.notes||'').substring(0,80)}</span>
          <span class="mdate">${(m.tasks||[]).length} görev</span>
        </div>
      </div>`).join('');
}

function viewMeeting(mid){
  const m=meetings.find(x=>x.id===mid); if(!m)return;
  const el=document.getElementById('page-dashboard');
  activePage='dashboard';
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
  document.querySelector('.sb-item[data-page="dashboard"]').classList.add('active');
  ['dashboard','new-meeting','history','all-depts','dept'].forEach(p=>{
    document.getElementById('page-'+p).style.display=p==='dashboard'?'block':'none';
  });
  const tasks=m.tasks||[];
  const total=tasks.length,done=tasks.filter(t=>t.status==='tamamlandi').length,
    acil=tasks.filter(t=>t.priority==='acil'&&t.status!=='tamamlandi').length,sevk=tasks.filter(t=>t.sevk_dept).length;
  el.innerHTML=`<div class="ph"><div><h2>${m.title||'Toplantı'}</h2>
    <div class="ph-sub">${fmt(m.date)} tarihli toplantı</div></div></div>
    <div class="stats">
      <div class="scard"><div class="snum">${total}</div><div class="slbl">Toplam</div></div>
      <div class="scard"><div class="snum g">${done}</div><div class="slbl">Tamamlandı</div></div>
      <div class="scard"><div class="snum r">${acil}</div><div class="slbl">Acil</div></div>
      <div class="scard"><div class="snum p">${sevk}</div><div class="slbl">Sevk</div></div>
    </div>`+
    (tasks.length?tasks.map(t=>taskCard(t,mid)).join(''):'<div class="empty">Bu toplantıda görev yok.</div>');
}

// ════════════════════════════════
// ALL DEPTS
// ════════════════════════════════
function renderAllDepts(){
  const all=meetings.flatMap(m=>m.tasks||[]);
  const el=document.getElementById('page-all-depts');
  el.innerHTML=`<div class="ph"><h2>Tüm Bölümler</h2></div>`+
    DEPTS.map(d=>{
      const dt=all.filter(t=>t.dept===d);
      const total=dt.length,done=dt.filter(t=>t.status==='tamamlandi').length;
      const pct=total?Math.round(done/total*100):0;
      const acil=dt.filter(t=>t.priority==='acil'&&t.status!=='tamamlandi').length;
      return`<div class="dept-bar-wrap">
        <div class="dept-bar-top">
          <span class="dept-bar-name">${d} ${acil?`<span class="tag t-acil" style="font-size:.65rem">🔴 ${acil} acil</span>`:''}</span>
          <span class="dept-bar-stat">${done}/${total} tamamlandı · %${pct}</span>
        </div>
        <div class="dbar"><div class="dbar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
}

// ════════════════════════════════
// DEPT PAGE (takvim + görevler)
// ════════════════════════════════
function renderDeptPage(){
  if(!activeDept) return;
  const d = activeDept;
  const all = meetings.flatMap(m=>(m.tasks||[]).map(t=>({...t,_date:m.date,_mid:m.id})));
  const dTasks = all.filter(t=>t.dept===d);
  const total=dTasks.length,done=dTasks.filter(t=>t.status==='tamamlandi').length,
    acil=dTasks.filter(t=>t.priority==='acil'&&t.status!=='tamamlandi').length,
    bekliyor=dTasks.filter(t=>t.status==='bekliyor').length;

  const now=new Date();
  calYear=calYear||now.getFullYear(); calMonth=calMonth||now.getMonth();

  const el=document.getElementById('page-dept');
  el.innerHTML=`
    <div class="ph"><h2>🏭 ${d}</h2></div>
    <div class="stats">
      <div class="scard"><div class="snum">${total}</div><div class="slbl">Toplam</div></div>
      <div class="scard"><div class="snum g">${done}</div><div class="slbl">Tamamlandı</div></div>
      <div class="scard"><div class="snum r">${acil}</div><div class="slbl">Acil</div></div>
      <div class="scard"><div class="snum o">${bekliyor}</div><div class="slbl">Bekliyor</div></div>
    </div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="tog-cal" onclick="showCalendar()">📅 Takvim</button>
      <button class="toggle-btn" id="tog-list" onclick="showList()">📋 Liste</button>
    </div>
    <div id="dept-calendar">${buildCalendar(dTasks)}</div>
    <div id="dept-list" style="display:none">${buildDeptList(dTasks)}</div>`;
}

function showCalendar(){
  document.getElementById('dept-calendar').style.display='block';
  document.getElementById('dept-list').style.display='none';
  document.getElementById('tog-cal').classList.add('active');
  document.getElementById('tog-list').classList.remove('active');
}
function showList(){
  document.getElementById('dept-calendar').style.display='none';
  document.getElementById('dept-list').style.display='block';
  document.getElementById('tog-cal').classList.remove('active');
  document.getElementById('tog-list').classList.add('active');
}

function calNav(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  const all=meetings.flatMap(m=>(m.tasks||[]).map(t=>({...t,_date:m.date,_mid:m.id})));
  const dTasks=all.filter(t=>t.dept===activeDept);
  document.getElementById('dept-calendar').innerHTML=buildCalendar(dTasks);
}

function buildCalendar(tasks){
  const DAYS=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  const mn=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const todayStr=today();
  const firstDay=new Date(calYear,calMonth,1);
  let startDow=firstDay.getDay()-1; if(startDow<0)startDow=6;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  // tasks by date
  const byDate={};
  tasks.forEach(t=>{
    const d=t.termin||t._date;
    if(!d)return;
    const [y,m]=d.split('-');
    if(parseInt(y)===calYear&&parseInt(m)-1===calMonth){
      if(!byDate[d])byDate[d]=[];
      byDate[d].push(t);
    }
  });

  let html=`<div class="cal-wrap">
    <div class="cal-hdr">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <h3>${mn[calMonth]} ${calYear}</h3>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">`;
  DAYS.forEach(d=>html+=`<div class="cal-day-hdr">${d}</div>`);

  let cell=0;
  for(let i=0;i<startDow;i++){html+=`<div class="cal-day other"></div>`;cell++;}
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const ts=byDate[ds]||[];
    html+=`<div class="cal-day${isToday?' today':''}">
      <div class="dn">${d}</div>
      ${ts.slice(0,3).map(t=>`<div class="cal-dot ${t.status==='tamamlandi'?'done':t.priority==='acil'?'acil':'normal'}" title="${t.text}">${t.text.substring(0,20)}</div>`).join('')}
      ${ts.length>3?`<div style="font-size:.6rem;color:var(--muted)">+${ts.length-3} daha</div>`:''}
    </div>`;
    cell++;
  }
  const rem=(7-cell%7)%7;
  for(let i=0;i<rem;i++)html+=`<div class="cal-day other"></div>`;
  html+=`</div></div>`;
  return html;
}

function buildDeptList(tasks){
  if(!tasks.length) return '<div class="empty">Bu bölüme ait görev yok.</div>';
  const pending=tasks.filter(t=>t.status!=='tamamlandi');
  const done=tasks.filter(t=>t.status==='tamamlandi');
  let html='';
  if(pending.length){
    html+=`<div class="section-sep">Aktif Görevler (${pending.length})</div>`;
    html+=pending.map(t=>taskCard(t,t._mid)).join('');
  }
  if(done.length){
    html+=`<div class="section-sep">Tamamlananlar (${done.length})</div>`;
    html+=done.map(t=>taskCard(t,t._mid)).join('');
  }
  return html;
}

// ════════════════════════════════
// UTILS
// ════════════════════════════════
function today(){ return new Date().toISOString().slice(0,10); }
function fmt(d){ if(!d)return''; const[y,m,dd]=d.split('-'); return`${dd}.${m}.${y}`; }
function termSt(d){
  const diff=(new Date(d)-new Date(today()))/86400000;
  return diff<0?'late':diff<=2?'soon':'ok';
}
function termLbl(s){ return s==='late'?'Gecikmiş':s==='soon'?'Yaklaşıyor':'Zamanında'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function notif(msg,type='info'){
  const n=document.createElement('div');
  n.className='notif '+type; n.textContent=msg;
  document.body.appendChild(n); setTimeout(()=>n.remove(),3000);
}
</script>
